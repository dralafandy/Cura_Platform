<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d7a62" />
    <title>Online Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f8f6;
        --bg-soft: rgba(255, 255, 255, 0.72);
        --card: rgba(255, 255, 255, 0.88);
        --card-strong: #ffffff;
        --line: rgba(13, 122, 98, 0.12);
        --line-strong: rgba(13, 122, 98, 0.22);
        --text: #10231e;
        --muted: #59736c;
        --brand: #0d7a62;
        --brand-strong: #0a5d4b;
        --accent: #d7a64a;
        --shadow: 0 24px 80px rgba(16, 35, 30, 0.12);
        --radius-xl: 32px;
        --radius-lg: 24px;
        --radius-md: 18px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Manrope, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(13, 122, 98, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(215, 166, 74, 0.18), transparent 24%),
          linear-gradient(160deg, #eef6f3 0%, #f8fbfa 46%, #edf4f2 100%);
      }
      body[data-lang='ar'] {
        font-family: Cairo, system-ui, sans-serif;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.45) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.45) 1px, transparent 1px);
        background-size: 42px 42px;
        -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 85%);
                mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 85%);
        opacity: 0.45;
      }
      #app {
        min-height: 100vh;
        position: relative;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      .booking-page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 38px 0 48px;
      }
      .booking-hero,
      .booking-panel {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: var(--card);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }
      .booking-hero {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.7fr);
        gap: 24px;
        padding: 34px;
        isolation: isolate;
      }
      .booking-hero--loading,
      .booking-panel--message,
      .booking-panel--success {
        max-width: 820px;
        margin: 7vh auto 0;
        padding: 42px;
      }
      .booking-hero__content,
      .booking-hero__card,
      .booking-panel--message,
      .booking-panel--success {
        position: relative;
        z-index: 1;
      }
      .booking-hero__glow {
        position: absolute;
        width: 360px;
        height: 360px;
        right: -110px;
        top: -140px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(13, 122, 98, 0.22), transparent 68%);
        z-index: 0;
      }
      .booking-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(13, 122, 98, 0.1);
        color: var(--brand-strong);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .booking-hero h1,
      .booking-panel h1 {
        margin: 16px 0 12px;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }
      .booking-hero p,
      .booking-panel p {
        margin: 0;
        max-width: 720px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.8;
      }
      .booking-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }
      .booking-meta__item {
        padding: 10px 14px;
        border: 1px solid rgba(13, 122, 98, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font-size: 14px;
        font-weight: 700;
      }
      .booking-contact-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 14px;
      }
      .booking-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(13, 122, 98, 0.32);
        align-self: center;
      }
      .booking-hero__card {
        align-self: stretch;
        display: grid;
        gap: 12px;
        padding: 18px;
        border-radius: 26px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.7));
        border: 1px solid rgba(13, 122, 98, 0.14);
      }
      .booking-hero__stat {
        display: grid;
        gap: 6px;
        padding: 16px;
        border-radius: 20px;
        background: var(--card-strong);
        border: 1px solid rgba(13, 122, 98, 0.1);
      }
      .booking-hero__stat span,
      .booking-summary__item span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      .booking-hero__stat strong,
      .booking-summary__item strong,
      .booking-success-id strong {
        font-size: 16px;
        line-height: 1.6;
      }
      .booking-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(300px, 0.75fr);
        gap: 22px;
        margin-top: 22px;
        align-items: start;
      }
      .booking-form,
      .booking-summary {
        padding: 28px;
      }
      .booking-section-heading {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 18px;
      }
      .booking-section-heading--spaced {
        margin-top: 24px;
      }
      .booking-section-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 42px;
        height: 42px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--brand), var(--brand-strong));
        color: #fff;
        font-size: 14px;
        font-weight: 800;
      }
      .booking-section-heading h2,
      .booking-summary h2 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.03em;
      }
      .booking-section-heading p,
      .booking-summary p {
        margin-top: 6px;
        font-size: 14px;
        line-height: 1.8;
      }
      .booking-grid {
        display: grid;
        gap: 16px;
      }
      .booking-grid--two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .booking-field {
        display: grid;
        gap: 8px;
      }
      .booking-label {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }
      .booking-control {
        width: 100%;
        min-height: 56px;
        padding: 14px 16px;
        border: 1px solid rgba(13, 122, 98, 0.16);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.94);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }
      .booking-control::-moz-placeholder {
        color: #7a8d88;
      }
      .booking-control::placeholder {
        color: #7a8d88;
      }
      .booking-control:focus {
        border-color: rgba(13, 122, 98, 0.42);
        box-shadow: 0 0 0 4px rgba(13, 122, 98, 0.08);
        transform: translateY(-1px);
      }
      .booking-control--textarea {
        min-height: 132px;
        resize: vertical;
      }
      .booking-feedback {
        min-height: 24px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }
      .booking-feedback.is-visible {
        opacity: 1;
      }
      .booking-feedback.is-error {
        color: #b42318;
      }
      .booking-submit {
        min-height: 58px;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--brand), var(--brand-strong));
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 18px 30px rgba(13, 122, 98, 0.22);
      }
      .booking-submit:hover {
        transform: translateY(-2px);
      }
      .booking-submit:disabled {
        opacity: 0.7;
        cursor: wait;
        transform: none;
      }
      .booking-summary {
        position: sticky;
        top: 20px;
      }
      .booking-summary__intro {
        padding-bottom: 18px;
        border-bottom: 1px solid rgba(13, 122, 98, 0.1);
      }
      .booking-summary__list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }
      .booking-summary__item {
        display: grid;
        gap: 6px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(13, 122, 98, 0.1);
      }
      .booking-success-mark,
      .booking-icon-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 68px;
        height: 68px;
        border-radius: 22px;
        margin-bottom: 16px;
        background: linear-gradient(135deg, rgba(13, 122, 98, 0.14), rgba(13, 122, 98, 0.26));
        color: var(--brand-strong);
        font-size: 30px;
        font-weight: 800;
      }
      .booking-success-id {
        display: inline-grid;
        gap: 6px;
        margin-top: 28px;
        padding: 18px 22px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(13, 122, 98, 0.12);
      }
      .booking-success-id span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      @media (max-width: 920px) {
        .booking-hero,
        .booking-layout {
          grid-template-columns: 1fr;
        }
        .booking-summary {
          position: static;
        }
      }
      @media (max-width: 640px) {
        .booking-page {
          width: min(100% - 20px, 1180px);
          padding: 18px 0 28px;
        }
        .booking-hero,
        .booking-form,
        .booking-summary,
        .booking-panel--message,
        .booking-panel--success,
        .booking-hero--loading {
          padding: 22px;
          border-radius: 24px;
        }
        .booking-grid--two {
          grid-template-columns: 1fr;
        }
        .booking-hero h1,
        .booking-panel h1 {
          font-size: 32px;
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/online-booking-qmyofF5W.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/publicBookingService-CnMW4Q4Y.js">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
